<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>HK Trip Companion</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HK Trip" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    html, body { background: #f8fafc; color: #0f172a; overscroll-behavior-y: contain; }
    body { padding-top: env(safe-area-inset-top); }
    .no-tap { -webkit-tap-highlight-color: transparent; }
    input, select, textarea, button { font-size: 16px; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::after { content: '▾'; float: right; transition: transform .2s; color: #94a3b8; }
    details[open] > summary::after { transform: rotate(180deg); }
    @media (display-mode: standalone) { body { user-select: none; -webkit-user-select: none; } }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#64748b;font-family:system-ui">Đang tải…</div>
  </div>
  <script type="text/babel" data-presets="react" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((e) => console.warn('SW fail:', e));
      });
    }
  </script>
</body>
</html>
